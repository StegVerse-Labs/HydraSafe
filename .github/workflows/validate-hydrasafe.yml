name: Validate HydraSafe

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check jsonschema

      - name: Validate HydraSafe repository
        run: python scripts/validate_repository.py
